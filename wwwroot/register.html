```html
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-container">

<div class="auth-card animate-fade-in">

    <div class="auth-header">

        <div class="auth-icon-wrap">
            <i class="fas fa-user-plus"></i>
        </div>

        <h1>ĐĂNG KÝ TÀI KHOẢN</h1>

        <p style="color: var(--text-light); font-size: 0.9rem;">
            Tạo tài khoản để sử dụng hệ thống quản lý phòng trọ.
        </p>

    </div>

    <form id="registerForm">

        <div class="form-group">
            <label>Tên đăng nhập</label>

            <div style="position: relative;">
                <i class="fas fa-user"
                   style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-light);"></i>

                <input type="text"
                       id="tenDangNhap"
                       class="form-control"
                       style="padding-left:2.5rem;"
                       placeholder="Nhập tên đăng nhập..."
                       required>
            </div>
        </div>

        <div class="form-group">
            <label>Họ tên</label>

            <div style="position: relative;">
                <i class="fas fa-id-card"
                   style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-light);"></i>

                <input type="text"
                       id="hoTen"
                       class="form-control"
                       style="padding-left:2.5rem;"
                       placeholder="Nhập họ tên..."
                       required>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>

            <div style="position: relative;">
                <i class="fas fa-envelope"
                   style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-light);"></i>

                <input type="email"
                       id="email"
                       class="form-control"
                       style="padding-left:2.5rem;"
                       placeholder="example@gmail.com"
                       required>
            </div>
        </div>

        <div class="form-group">
            <label>Số điện thoại</label>

            <div style="position: relative;">
                <i class="fas fa-phone"
                   style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-light);"></i>

                <input type="text"
                       id="soDienThoai"
                       class="form-control"
                       style="padding-left:2.5rem;"
                       placeholder="Nhập số điện thoại..."
                       required>
            </div>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>

            <div style="position: relative;">
                <i class="fas fa-lock"
                   style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-light);"></i>

                <input type="password"
                       id="matKhau"
                       class="form-control"
                       style="padding-left:2.5rem;"
                       placeholder="Nhập mật khẩu..."
                       required>
            </div>
        </div>

        <div class="form-group">
            <label>Vai trò</label>

            <select id="vaiTro" class="form-control">

                <option value="NguoiDung">
                    Người dùng
                </option>

                <option value="ChuTro">
                    Chủ trọ
                </option>

            </select>
        </div>

        <div id="registerMsg"
             style="display:none;
                    font-size:.875rem;
                    padding:.75rem 1rem;
                    border-radius:.5rem;
                    margin-bottom:1rem;">
        </div>

        <button type="submit" class="btn btn-primary">

            <span id="registerBtnText">
                <i class="fas fa-user-plus"></i>
                Đăng ký
            </span>

            <i id="registerLoader"
               class="fas fa-spinner fa-spin"
               style="display:none;"></i>

        </button>

    </form>

    <div style="margin-top:1rem;text-align:center;">

        <a href="/index.html"
           style="font-size:.875rem;
                  color:var(--primary);
                  text-decoration:none;
                  font-weight:600;">

            <i class="fas fa-arrow-left"></i>
            Quay lại đăng nhập

        </a>

    </div>

</div>

<script>

document.getElementById('registerForm')
.addEventListener('submit', async (e) => {

    e.preventDefault();

    const msgBox  = document.getElementById('registerMsg');

    const btnText = document.getElementById('registerBtnText');

    const loader  = document.getElementById('registerLoader');

    msgBox.style.display = 'none';

    btnText.style.display = 'none';

    loader.style.display = 'inline-block';

    try {

        const response = await fetch('/api/Auth/dang-ky', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                tenDangNhap: document.getElementById('tenDangNhap').value.trim(),
                matKhau: document.getElementById('matKhau').value,
                email: document.getElementById('email').value.trim(),
                hoTen: document.getElementById('hoTen').value.trim(),
                soDienThoai: document.getElementById('soDienThoai').value.trim(),
                vaiTro: document.getElementById('vaiTro').value
            })
        });

        const data = await response.json();

        console.log(data);

        msgBox.style.display = 'block';

        if (response.ok && data.thanhCong) {

            msgBox.style.background = '#d1fae5';

            msgBox.style.color = '#065f46';

            msgBox.innerHTML =
                `<i class="fas fa-check-circle"></i>
                 ${data.thongBao || 'Đăng ký thành công'}`;

            setTimeout(() => {

                window.location.href = '/index.html';

            }, 1500);

        } else {

            msgBox.style.background = '#fee2e2';

            msgBox.style.color = '#991b1b';

            msgBox.innerHTML =
                `<i class="fas fa-exclamation-circle"></i>
                 ${data.thongBao || data.title || 'Đăng ký thất bại'}`;
        }

    } catch (error) {

        console.error(error);

        msgBox.style.display = 'block';

        msgBox.style.background = '#fee2e2';

        msgBox.style.color = '#991b1b';

        msgBox.innerHTML =
            '<i class="fas fa-exclamation-circle"></i> Lỗi kết nối hệ thống.';
    }

    finally {

        btnText.style.display = 'inline-block';

        loader.style.display = 'none';
    }
});
</script>

</body>
</html>
```

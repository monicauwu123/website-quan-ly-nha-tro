<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Quản Lý Phòng Trọ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-container">
    <div class="auth-card animate-fade-in">
        <div class="auth-header">
            <div style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;">
                <i class="fas fa-home"></i>
            </div>
            <h1>QUẢN LÝ PHÒNG TRỌ</h1>
            <p style="color: var(--text-light);">Chào mừng bạn trở lại, hãy đăng nhập để tiếp tục.</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
                    <input type="text" id="username" class="form-control" style="padding-left: 2.5rem;" placeholder="Nhập tên đăng nhập..." required value="Admin">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light);"></i>
                    <input type="password" id="password" class="form-control" style="padding-left: 2.5rem;" placeholder="Nhập mật khẩu..." required value="Admin123">
                </div>
            </div>

            <div id="errorMessage" style="color: var(--error); font-size: 0.875rem; margin-bottom: 1rem; display: none; text-align: center;">
                Tên đăng nhập hoặc mật khẩu không chính xác.
            </div>

            <button type="submit" class="btn btn-primary">
                <span id="btnText">Đăng nhập</span>
                <i id="btnLoader" class="fas fa-spinner fa-spin" style="display: none;"></i>
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem; color: var(--text-light);">
            Hệ thống quản lý phòng trọ chuyên nghiệp v1.0
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
